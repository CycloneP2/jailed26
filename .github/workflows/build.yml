name: Build Tweak with Theos iOS 26

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Xcode and SDK version
        run: |
          set -e
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Install dependencies
        run: |
          set -e
          brew install ldid make xz dpkg

      - name: Setup Theos and theos-jailed
        run: |
          set -e

          export THEOS="$HOME/theos"

          echo "Removing old Theos..."
          rm -rf "$THEOS"

          echo "Installing Theos..."
          git clone --recursive https://github.com/theos/theos.git "$THEOS"

          echo "Installing theos-jailed as jailed module..."
          mkdir -p "$THEOS/modules"
          git clone https://github.com/kabiroberai/theos-jailed.git "$THEOS/modules/jailed"

          echo "Preparing SDK folder..."
          rm -rf "$THEOS/sdks"
          mkdir -p "$THEOS/sdks"

          echo "Downloading Theos SDKs..."
          curl -L https://github.com/theos/sdks/archive/refs/heads/master.zip -o sdks.zip
          unzip -q sdks.zip

          echo "Copying Theos SDKs..."
          cp -R sdks-master/*.sdk "$THEOS/sdks/" || true

          rm -rf sdks-master sdks.zip

          echo "THEOS=$THEOS" >> "$GITHUB_ENV"
          echo "$THEOS/bin" >> "$GITHUB_PATH"

          echo "Installed Theos:"
          ls -la "$THEOS"

          echo "Installed modules:"
          ls -la "$THEOS/modules"

          echo "Installed jailed module:"
          ls -la "$THEOS/modules/jailed"
          ls -la "$THEOS/modules/jailed/module"

          echo "Installed SDKs:"
          ls -la "$THEOS/sdks" || true

      - name: Debug project structure
        run: |
          set -e

          echo "Current directory:"
          pwd

          echo "Project files:"
          ls -la

          echo "Workflow folder:"
          ls -la .github || true
          ls -la .github/workflows || true

          echo "Makefile:"
          cat Makefile

          echo "Plist files:"
          ls -la *.plist || true

          echo "Control file:"
          cat control || true

      - name: Build package
        run: |
          set -e

          export THEOS="$HOME/theos"
          export ARCHS="arm64"
          export TARGET="iphone:clang:latest:26.0"

          make clean
          make package

      - name: Show build output
        if: always()
        run: |
          echo "Packages:"
          ls -la packages || true

          echo "Theos build folder:"
          ls -la .theos || true

          echo "Object files:"
          find .theos -type f || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb-overlay-ios26-build
          path: |
            packages/*
            .theos/obj/**/*.dylib
          if-no-files-found: warn